<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="300" height="300" viewBox="0 0 300 300" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A0A3E"/>
      <stop offset="100%" stop-color="#08081C"/>
    </radialGradient>
    <radialGradient id="glow" cx="78%" cy="24%" r="45%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fillGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3D1A7A" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#5B21B6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="246" cy="66" r="120" fill="url(#glow)"/>

  <!-- Chart fill area -->
  <polygon points="38,250 38,228 100,186 155,137 212,96 260,62 260,250"
           fill="url(#fillGrad)"/>

  <!-- Baseline -->
  <line x1="30" y1="250" x2="268" y2="250" stroke="#2D2D5E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Chart line -->
  <polyline points="38,228 100,186 155,137 212,96 260,62"
            fill="none" stroke="url(#lineGrad)" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data point dots -->
  <circle cx="38"  cy="228" r="7.5" fill="#C084FC"/>
  <circle cx="100" cy="186" r="7.5" fill="#9D55F5"/>
  <circle cx="155" cy="137" r="7.5" fill="#7C3AED"/>
  <circle cx="212" cy="96"  r="8"   fill="#60A5FA"/>
  <circle cx="260" cy="62"  r="9"   fill="#93C5FD"/>
</svg>
